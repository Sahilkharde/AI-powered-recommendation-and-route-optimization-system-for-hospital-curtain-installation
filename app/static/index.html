<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e293b">
<title>AI Automation Hospital AI Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #475569;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 12px; color: var(--text2); margin-top: 2px; }

.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 60px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.container { max-width: 480px; margin: 0 auto; padding: 16px; }

.panel { display: none; }
.panel.active { display: block; }

/* Scan input area */
.scan-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.scan-box label { font-size: 13px; color: var(--text2); font-weight: 600; display: block; margin-bottom: 8px; }

.input-row {
  display: flex;
  gap: 8px;
}
.input-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  padding: 12px 14px;
  outline: none;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--border); }

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-full { width: 100%; margin-top: 12px; padding: 14px; font-size: 15px; }

.btn-cam {
  background: var(--surface2);
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 48px;
}
.btn-cam svg { width: 20px; height: 20px; }

#camera-region {
  display: none;
  margin-top: 12px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
#camera-region.active { display: block; }
#camera-region video { width: 100%; border-radius: 8px; }
.cam-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 18px;
  cursor: pointer;
  z-index: 10;
}

/* Results */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.result-header {
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.result-rank {
  font-size: 12px;
  font-weight: 700;
  color: var(--bg);
  background: var(--accent);
  border-radius: 6px;
  padding: 4px 10px;
  min-width: 32px;
  text-align: center;
}
.result-rank.top { background: var(--green); }

.score-badge {
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
}
.score-badge small { font-size: 12px; color: var(--text2); font-weight: 500; }
.score-high { color: var(--green); }
.score-mid { color: var(--yellow); }
.score-low { color: var(--orange); }

.result-body { padding: 0 16px 16px; }

.location-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
  font-size: 14px;
}
.loc-label { color: var(--text2); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.loc-value { font-weight: 500; }
.loc-value.track-code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent);
  font-weight: 700;
  font-size: 15px;
}

.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
}
.badge-ok { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-warn { background: rgba(249,115,22,0.15); color: var(--orange); }
.badge-err { background: rgba(239,68,68,0.15); color: var(--red); }

.warnings-list { margin-top: 10px; }
.warning-item {
  font-size: 12px;
  color: var(--orange);
  padding: 6px 10px;
  background: rgba(249,115,22,0.08);
  border-radius: 6px;
  margin-top: 4px;
  line-height: 1.4;
}

.status-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
  font-size: 14px;
}
.status-msg.error { color: var(--red); }

.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
}

/* Route */
.route-segment {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.segment-header {
  padding: 14px 16px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.segment-count {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

.stop-item {
  padding: 10px 16px;
  font-size: 13px;
  border-bottom: 1px solid rgba(71,85,105,0.3);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.stop-item:last-child { border-bottom: none; }
.stop-num {
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.stop-detail { line-height: 1.5; }
.stop-detail .track-code { color: var(--accent); font-family: 'SF Mono', monospace; font-weight: 600; }

.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Quick picks */
.quick-picks { margin-top: 12px; }
.quick-picks p { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.picks-row { display: flex; flex-wrap: wrap; gap: 6px; }
.pick-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'SF Mono', monospace;
  transition: all 0.15s;
}
.pick-btn:hover { background: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>AI Automation Hospital AI Agent</h1>
  <p>Scan a curtain or track barcode for instant guidance</p>
</div>

<div class="tabs">
  <button class="tab active" data-tab="curtain">Scan Curtain</button>
  <button class="tab" data-tab="track">Scan Track</button>
  <button class="tab" data-tab="route">My Route</button>
</div>

<div class="container">

  <!-- ─── CURTAIN TAB ─── -->
  <div class="panel active" id="panel-curtain">
    <div class="scan-box">
      <label>CURTAIN BARCODE</label>
      <div class="input-row">
        <input type="text" id="curtain-input" placeholder="e.g. 1576-C0001" autocomplete="off" inputmode="text">
        <button class="btn btn-cam" id="curtain-cam" title="Scan with camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
      <div id="curtain-camera-region" class="camera-region"></div>
      <button class="btn btn-full" id="curtain-go">Where should I install this?</button>
      <div class="quick-picks">
        <p>Try a sample barcode:</p>
        <div class="picks-row">
          <button class="pick-btn" data-bc="1576-C0001">1576-C0001</button>
          <button class="pick-btn" data-bc="2301-C0034">2301-C0034</button>
          <button class="pick-btn" data-bc="0099-C0102">0099-C0102</button>
          <button class="pick-btn" data-bc="1001-C0082">1001-C0082</button>
        </div>
      </div>
    </div>
    <div id="curtain-results"></div>
  </div>

  <!-- ─── TRACK TAB ─── -->
  <div class="panel" id="panel-track">
    <div class="scan-box">
      <label>TRACK BARCODE</label>
      <div class="input-row">
        <input type="text" id="track-input" placeholder="e.g. 1576-T0001" autocomplete="off" inputmode="text">
        <button class="btn btn-cam" id="track-cam" title="Scan with camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
      <div id="track-camera-region" class="camera-region"></div>
      <button class="btn btn-full" id="track-go">Which curtains fit this track?</button>
      <div class="quick-picks">
        <p>Try a sample barcode:</p>
        <div class="picks-row">
          <button class="pick-btn" data-tb="1576-T0001">1576-T0001</button>
          <button class="pick-btn" data-tb="1576-T0005">1576-T0005</button>
          <button class="pick-btn" data-tb="2301-T0012">2301-T0012</button>
        </div>
      </div>
    </div>
    <div id="track-results"></div>
  </div>

  <!-- ─── ROUTE TAB ─── -->
  <div class="panel" id="panel-route">
    <div class="scan-box">
      <label>INSTALLER ID</label>
      <div class="input-row">
        <input type="number" id="route-input" placeholder="e.g. 1" min="1" inputmode="numeric">
        <button class="btn" id="route-go">Get My Route</button>
      </div>
      <div class="quick-picks">
        <p>Try an installer ID:</p>
        <div class="picks-row">
          <button class="pick-btn" data-rid="1">Installer 1</button>
          <button class="pick-btn" data-rid="2">Installer 2</button>
          <button class="pick-btn" data-rid="3">Installer 3</button>
        </div>
      </div>
    </div>
    <div id="route-results"></div>
  </div>

</div>

<script>
const API = '/api/v1';

// ─── Tab switching ───
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ─── Quick picks ───
document.querySelectorAll('.pick-btn[data-bc]').forEach(btn => {
  btn.addEventListener('click', () => { document.getElementById('curtain-input').value = btn.dataset.bc; scanCurtain(); });
});
document.querySelectorAll('.pick-btn[data-tb]').forEach(btn => {
  btn.addEventListener('click', () => { document.getElementById('track-input').value = btn.dataset.tb; scanTrack(); });
});
document.querySelectorAll('.pick-btn[data-rid]').forEach(btn => {
  btn.addEventListener('click', () => { document.getElementById('route-input').value = btn.dataset.rid; loadRoute(); });
});

// ─── Enter key ───
document.getElementById('curtain-input').addEventListener('keydown', e => { if (e.key === 'Enter') scanCurtain(); });
document.getElementById('track-input').addEventListener('keydown', e => { if (e.key === 'Enter') scanTrack(); });
document.getElementById('route-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadRoute(); });

// ─── Buttons ───
document.getElementById('curtain-go').addEventListener('click', scanCurtain);
document.getElementById('track-go').addEventListener('click', scanTrack);
document.getElementById('route-go').addEventListener('click', loadRoute);

// ─── Score color ───
function scoreClass(s) { return s >= 60 ? 'score-high' : s >= 35 ? 'score-mid' : 'score-low'; }

// ─── CURTAIN SCAN ───
async function scanCurtain() {
  const bc = document.getElementById('curtain-input').value.trim();
  if (!bc) return;
  const el = document.getElementById('curtain-results');
  const btn = document.getElementById('curtain-go');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Scanning...';
  el.innerHTML = '';

  try {
    const res = await fetch(API + '/suggest-location', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({curtain_barcode: bc})
    });
    const d = await res.json();
    if (!res.ok) { el.innerHTML = '<div class="status-msg error">' + (d.detail || 'Error') + '</div>'; return; }

    let html = '<div class="meta-row">';
    html += '<span>' + d.hospital_name + '</span>';
    html += '<span>' + d.curtain_category + ' | ' + d.curtain_status + '</span>';
    if (d.is_disposable) html += '<span class="badge badge-warn">Disposable</span>';
    if (d.is_spare) html += '<span class="badge badge-warn">Spare</span>';
    html += '</div>';

    if (!d.recommendations.length) {
      html += '<div class="status-msg">No eligible tracks found for this curtain.</div>';
    }

    d.recommendations.forEach((r, i) => {
      const l = r.location;
      html += '<div class="result-card">';
      html += '<div class="result-header">';
      html += '<span class="result-rank' + (i === 0 ? ' top' : '') + '">#' + r.rank + '</span>';
      html += '<span class="score-badge ' + scoreClass(r.score) + '">' + r.score + '<small>/100</small></span>';
      html += '</div>';
      html += '<div class="result-body">';
      html += '<div class="location-grid">';
      html += '<span class="loc-label">Building</span><span class="loc-value">' + l.building_name + '</span>';
      html += '<span class="loc-label">Floor</span><span class="loc-value">' + l.floor + '</span>';
      html += '<span class="loc-label">Unit</span><span class="loc-value">' + l.unit_name + '</span>';
      html += '<span class="loc-label">Room</span><span class="loc-value">' + l.room_name + '</span>';
      html += '<span class="loc-label">Track</span><span class="loc-value track-code">' + l.track_barcode + '</span>';
      html += '</div>';
      html += '<div class="badges">';
      html += r.type_match ? '<span class="badge badge-ok">Type OK</span>' : '<span class="badge badge-warn">Type Mismatch</span>';
      html += r.style_match ? '<span class="badge badge-ok">Style OK</span>' : '<span class="badge badge-warn">Style Mismatch</span>';
      html += r.size_match ? '<span class="badge badge-ok">Size OK</span>' : '<span class="badge badge-warn">Size Mismatch</span>';
      html += r.has_capacity ? '<span class="badge badge-ok">Has Capacity</span>' : '<span class="badge badge-err">Full</span>';
      html += '</div>';
      if (r.warnings.length) {
        html += '<div class="warnings-list">';
        r.warnings.forEach(w => { html += '<div class="warning-item">' + w + '</div>'; });
        html += '</div>';
      }
      html += '</div></div>';
    });

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="status-msg error">Network error: ' + e.message + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Where should I install this?';
  }
}

// ─── TRACK SCAN ───
async function scanTrack() {
  const bc = document.getElementById('track-input').value.trim();
  if (!bc) return;
  const el = document.getElementById('track-results');
  const btn = document.getElementById('track-go');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Scanning...';
  el.innerHTML = '';

  try {
    const res = await fetch(API + '/match-curtains', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({track_barcode: bc})
    });
    const d = await res.json();
    if (!res.ok) { el.innerHTML = '<div class="status-msg error">' + (d.detail || 'Error') + '</div>'; return; }

    let html = '<div class="meta-row">';
    html += '<span>' + d.hospital_name + ' > ' + d.building_name + ' > Floor ' + d.floor + '</span>';
    html += '<span>' + d.track_type + ' | ' + d.track_length + '"</span>';
    html += '</div>';

    if (!d.matches.length) {
      html += '<div class="status-msg">No matching curtains available.</div>';
    }

    d.matches.forEach((m, i) => {
      html += '<div class="result-card">';
      html += '<div class="result-header">';
      html += '<span class="result-rank' + (m.is_best_match ? ' top' : '') + '">' + (m.is_best_match ? 'BEST' : '#' + (i+1)) + '</span>';
      html += '<span class="score-badge ' + scoreClass(m.score) + '">' + m.score + '<small>/100</small></span>';
      html += '</div>';
      html += '<div class="result-body">';
      html += '<div class="location-grid">';
      html += '<span class="loc-label">Barcode</span><span class="loc-value track-code">' + m.curtain_barcode + '</span>';
      html += '<span class="loc-label">Type</span><span class="loc-value">' + m.curtain_type + '</span>';
      html += '<span class="loc-label">Size</span><span class="loc-value">' + m.width + '" x ' + m.height + '"</span>';
      html += '<span class="loc-label">Status</span><span class="loc-value">' + m.status + '</span>';
      html += '</div>';
      if (m.warnings.length) {
        html += '<div class="warnings-list">';
        m.warnings.forEach(w => { html += '<div class="warning-item">' + w + '</div>'; });
        html += '</div>';
      }
      html += '</div></div>';
    });

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="status-msg error">Network error: ' + e.message + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Which curtains fit this track?';
  }
}

// ─── ROUTE ───
async function loadRoute() {
  const id = document.getElementById('route-input').value.trim();
  if (!id) return;
  const el = document.getElementById('route-results');
  const btn = document.getElementById('route-go');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Loading...';
  el.innerHTML = '';

  try {
    const res = await fetch(API + '/installer/' + id + '/route');
    const d = await res.json();
    if (!res.ok) { el.innerHTML = '<div class="status-msg error">' + (d.detail || 'Error') + '</div>'; return; }

    let html = '<div class="meta-row">';
    html += '<span>' + d.total_hospitals + ' hospitals</span>';
    html += '<span>' + d.total_stops + ' stops</span>';
    html += '<span>' + d.route_date + '</span>';
    html += '</div>';

    if (!d.segments.length) {
      html += '<div class="status-msg">No visits assigned for today.</div>';
    }

    d.segments.forEach(seg => {
      html += '<div class="route-segment">';
      html += '<div class="segment-header"><span>' + seg.hospital_name + '</span><span class="segment-count">' + seg.total_tracks + ' tracks</span></div>';
      seg.stops.forEach(s => {
        html += '<div class="stop-item">';
        html += '<span class="stop-num">' + s.order + '</span>';
        html += '<div class="stop-detail">' + s.building_name + ' > Floor ' + s.floor + ' > ' + s.unit_name + ' > ' + s.room_name + '<br><span class="track-code">' + s.track_barcode + '</span></div>';
        html += '</div>';
      });
      html += '</div>';
    });

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div class="status-msg error">Network error: ' + e.message + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get My Route';
  }
}

// ─── CAMERA BARCODE SCANNER ───
let activeScanner = null;

async function startCamera(inputId, regionId) {
  if (activeScanner) { stopCamera(); return; }
  const region = document.getElementById(regionId);
  if (!region) return;

  try {
    const { Html5Qrcode } = await loadScannerLib();
    region.style.display = 'block';
    region.innerHTML = '<div id="scanner-viewport"></div><button class="cam-close" onclick="stopCamera()">X</button>';
    activeScanner = new Html5Qrcode('scanner-viewport');
    await activeScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 100 }, aspectRatio: 1.5 },
      (decoded) => {
        document.getElementById(inputId).value = decoded;
        stopCamera();
        if (inputId === 'curtain-input') scanCurtain();
        else if (inputId === 'track-input') scanTrack();
      },
      () => {}
    );
  } catch (e) {
    region.innerHTML = '<div class="warning-item">Camera access denied or not available.</div>';
    region.style.display = 'block';
    setTimeout(() => { region.style.display = 'none'; region.innerHTML = ''; }, 3000);
  }
}

function stopCamera() {
  if (activeScanner) {
    activeScanner.stop().catch(() => {});
    activeScanner = null;
  }
  document.querySelectorAll('.camera-region').forEach(r => { r.style.display = 'none'; r.innerHTML = ''; });
}

let scannerLibLoaded = false;
function loadScannerLib() {
  return new Promise((resolve, reject) => {
    if (scannerLibLoaded) { resolve(window); return; }
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    s.onload = () => { scannerLibLoaded = true; resolve(window); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

document.getElementById('curtain-cam').addEventListener('click', () => startCamera('curtain-input', 'curtain-camera-region'));
document.getElementById('track-cam').addEventListener('click', () => startCamera('track-input', 'track-camera-region'));
</script>
</body>
</html>
